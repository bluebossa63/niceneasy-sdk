# SonarQube scanner configuration for niceneasy-sdk.
# Consumed by the k3s-native js-scanner CronJob in the fsi-ai-agent repo
# (infrastructure/k8s/js-scanner-job.yaml), which clones this repo and runs
# sonar-scanner against the internal SonarQube service. sonar.host.url and
# sonar.token are supplied at scan time (SONAR_HOST_URL / SONAR_TOKEN), so no
# secret lives here.
sonar.projectKey=niceneasy-sdk
sonar.projectName=niceneasy SDK
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,dist/**,**/*.d.ts
sonar.sourceEncoding=UTF-8
