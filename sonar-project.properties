# SonarQube scanner configuration for niceneasy-sdk.
# Consumed by the k3s-native js-scanner CronJob in the fsi-ai-agent repo
# (infrastructure/k8s/js-scanner-job.yaml), which clones this repo and runs
# sonar-scanner against the internal SonarQube service. sonar.host.url and
# sonar.token are supplied at scan time (SONAR_HOST_URL / SONAR_TOKEN), so no
# secret lives here.
sonar.projectKey=niceneasy-sdk
sonar.projectName=niceneasy SDK
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.mjs,tests/**/*.test.cjs
sonar.exclusions=**/node_modules/**,dist/**,dist-cjs/**,**/*.d.ts,coverage/**
sonar.sourceEncoding=UTF-8

# Test coverage: lcov is generated by `npm run coverage` (Node built-in test
# runner + V8 coverage, source-mapped back to src/*.ts) before the scan.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
