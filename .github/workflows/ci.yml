name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: bluebossa63/niceneasy-ci/.github/workflows/node-ci.yml@main
    with:
      node-version: "24"
      build-command: "npm run build"
      # Emit coverage/lcov.info (Node built-in test runner + V8 coverage,
      # source-mapped to src/*.ts) so the Sonar scan can ingest real coverage
      # instead of a blind 0%. See sonar-project.properties lcov.reportPaths.
      test-command: "npm run coverage"
